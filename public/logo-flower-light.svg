<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="petal">
      <!-- Outer petal curve -->
      <path d="M100 100 C 68 78, 62 44, 100 14 C 138 44, 132 78, 100 100"
            fill="none" stroke="#D4A088" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Inner petal curve -->
      <path d="M100 100 C 82 80, 80 56, 100 36 C 120 56, 118 80, 100 100"
            fill="none" stroke="#D4A088" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Four petals rotated 90° each -->
  <use href="#petal"/>
  <use href="#petal" transform="rotate(90 100 100)"/>
  <use href="#petal" transform="rotate(180 100 100)"/>
  <use href="#petal" transform="rotate(270 100 100)"/>

  <!-- Accent dots between petals -->
  <circle cx="140" cy="60" r="6" fill="#D4A088"/>
  <circle cx="140" cy="140" r="6" fill="#D4A088"/>
  <circle cx="60" cy="140" r="6" fill="#D4A088"/>
  <circle cx="60" cy="60" r="6" fill="#D4A088"/>
</svg>
